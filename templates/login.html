<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <title>登录 - Squid ACL 看板</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, "Microsoft YaHei", "PingFang SC", sans-serif;
      background: #0f172a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-wrap {
      width: 420px;
      background: #1e293b;
      border-radius: 16px;
      padding: 48px 40px 36px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
      border: 1px solid rgba(255,255,255,0.06);
    }

    .logo {
      text-align: center;
      margin-bottom: 36px;
    }

    .logo h1 {
      color: #f1f5f9;
      font-size: 22px;
      font-weight: 600;
      letter-spacing: 1px;
    }

    .logo span {
      color: #38bdf8;
    }

    .logo p {
      color: #64748b;
      font-size: 13px;
      margin-top: 6px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      color: #94a3b8;
      font-size: 13px;
      margin-bottom: 8px;
      letter-spacing: 0.5px;
    }

    .form-group input {
      width: 100%;
      padding: 12px 16px;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 10px;
      color: #f1f5f9;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .form-group input:focus {
      border-color: #38bdf8;
      box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.12);
    }

    .form-group input::placeholder {
      color: #475569;
    }

    .btn-login {
      width: 100%;
      padding: 13px;
      background: #0284c7;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 1px;
      transition: background 0.2s, transform 0.1s;
    }

    .btn-login:hover { background: #0369a1; }
    .btn-login:active { transform: scale(0.98); }

    .links {
      margin-top: 20px;
      display: flex;
      justify-content: space-between;
      font-size: 13px;
    }

    .links a {
      color: #38bdf8;
      text-decoration: none;
    }

    .links a:hover { text-decoration: underline; }

    /* Flash 消息 */
    .alert {
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 14px;
      line-height: 1.5;
    }

    .alert-danger {
      background: rgba(239, 68, 68, 0.12);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #fca5a5;
    }

    .alert-warning {
      background: rgba(245, 158, 11, 0.12);
      border: 1px solid rgba(245, 158, 11, 0.3);
      color: #fcd34d;
    }

    .alert-success {
      background: rgba(34, 197, 94, 0.12);
      border: 1px solid rgba(34, 197, 94, 0.3);
      color: #86efac;
    }

    .alert-info {
      background: rgba(56, 189, 248, 0.1);
      border: 1px solid rgba(56, 189, 248, 0.25);
      color: #7dd3fc;
    }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="logo">
      <h1>Squid <span>ACL</span> 看板</h1>
      <p>Squid Access Control &amp; Monitoring Dashboard</p>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }}">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="post" autocomplete="off">
      <div class="form-group">
        <label for="username">用户名</label>
        <input
          type="text"
          id="username"
          name="username"
          placeholder="请输入用户名"
          required
          autofocus
        >
      </div>

      <div class="form-group">
        <label for="password">密码</label>
        <input
          type="password"
          id="password"
          name="password"
          placeholder="请输入密码"
          required
        >
      </div>

      <button type="submit" class="btn-login">登 录</button>

      <div class="links">
        <a href="{{ url_prefix }}/forgot">忘记密码？</a>
      </div>
    </form>
  </div>
</body>
</html>

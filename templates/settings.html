<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <title>修改密码 - Squid ACL 看板</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, "Microsoft YaHei", "PingFang SC", sans-serif;
      background: #0f172a;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      width: 440px;
      background: #1e293b;
      border-radius: 16px;
      padding: 44px 40px 36px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      border: 1px solid rgba(255,255,255,0.06);
    }
    .card h2 { color: #f1f5f9; font-size: 20px; margin-bottom: 6px; }
    .card p { color: #64748b; font-size: 13px; margin-bottom: 30px; }
    .form-group { margin-bottom: 18px; }
    .form-group label {
      display: block;
      color: #94a3b8;
      font-size: 13px;
      margin-bottom: 8px;
    }
    .form-group input {
      width: 100%;
      padding: 11px 16px;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 10px;
      color: #f1f5f9;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .form-group input:focus {
      border-color: #38bdf8;
      box-shadow: 0 0 0 3px rgba(56,189,248,0.12);
    }
    .form-group input::placeholder { color: #475569; }
    .btn-row { display: flex; gap: 12px; margin-top: 28px; }
    .btn {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
      transition: background 0.2s, transform 0.1s;
    }
    .btn-primary { background: #0284c7; color: #fff; }
    .btn-primary:hover { background: #0369a1; }
    .btn-ghost {
      background: transparent;
      color: #94a3b8;
      border: 1px solid #334155;
    }
    .btn-ghost:hover { background: #1e293b; color: #f1f5f9; }
    .btn:active { transform: scale(0.98); }
    .alert {
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 14px;
      line-height: 1.5;
    }
    .alert-danger {
      background: rgba(239,68,68,0.12);
      border: 1px solid rgba(239,68,68,0.3);
      color: #fca5a5;
    }
    .alert-success {
      background: rgba(34,197,94,0.12);
      border: 1px solid rgba(34,197,94,0.3);
      color: #86efac;
    }
    .pwd-hint { color: #475569; font-size: 12px; margin-top: 6px; }
  </style>
</head>
<body>
  <div class="card">
    <h2>修改密码</h2>
    <p>当前登录账号：<strong style="color:#38bdf8">{{ username }}</strong></p>

    {% if error %}
      <div class="alert alert-danger">{{ error }}</div>
    {% endif %}
    {% if success %}
      <div class="alert alert-success">{{ success }}</div>
    {% endif %}

    <form method="post" autocomplete="off">
      <div class="form-group">
        <label for="old_password">原密码</label>
        <input
          type="password"
          id="old_password"
          name="old_password"
          placeholder="请输入当前密码"
          required
          autofocus
        >
      </div>
      <div class="form-group">
        <label for="new_password">新密码</label>
        <input
          type="password"
          id="new_password"
          name="new_password"
          placeholder="请输入新密码（至少 6 位）"
          required
          minlength="6"
        >
        <p class="pwd-hint">至少 6 位，建议包含大小写字母和数字。</p>
      </div>
      <div class="form-group">
        <label for="confirm_password">确认新密码</label>
        <input
          type="password"
          id="confirm_password"
          name="confirm_password"
          placeholder="再次输入新密码"
          required
          minlength="6"
        >
      </div>

      <div class="btn-row">
        <button type="submit" class="btn btn-primary">确认修改</button>
        <a href="{{ url_prefix }}/" class="btn btn-ghost">返回看板</a>
      </div>
    </form>
  </div>
</body>
</html>

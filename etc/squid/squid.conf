# ==============================================================================
# 1. 基础定义 (端口与认证)
# ==============================================================================

# --- 端口定义 (保留了您之前的自定义端口) ---
acl SSL_ports port 443
acl SSL_ports port 8088         # 自定义 HTTPS
acl SSL_ports port 8081         # 自定义 HTTPS
acl SSL_ports port 8080    
acl SSL_ports port 80
acl Safe_ports port 80          # http
acl Safe_ports port 21          # ftp
acl Safe_ports port 443         # https
acl Safe_ports port 70          # gopher
acl Safe_ports port 210         # wais
acl Safe_ports port 1025-65535  # unregistered ports
acl Safe_ports port 280         # http-mgmt
acl Safe_ports port 488         # gss-http
acl Safe_ports port 591         # filemaker
acl Safe_ports port 777         # multiling http
acl Safe_ports port 8081        # 自定义 HTTP
acl Safe_ports port 8088        # 自定义 HTTP
acl Safe_ports port 8080        
acl CONNECT method CONNECT

# --- 认证模块设置 ---
auth_param basic program /usr/lib64/squid/basic_ncsa_auth /etc/squid/passwd
auth_param basic children 5
auth_param basic realm Squid Basic Authentication
auth_param basic credentialsttl 2 hours
# 定义“需要认证的用户”
acl auth_user proxy_auth REQUIRED

# ==============================================================================
# 2. 分组 ACL 定义 (核心：定义四类人群)
# ==============================================================================

# [A类]：VIP (免密 + 全网通)
# 请确保文件存在: touch /etc/squid/ip_group_a.txt
acl group_a src "/etc/squid/ip_group_a.txt"

# [B类]：普通员工 (密码 + 全网通)
# 请确保文件存在: touch /etc/squid/ip_group_b.txt
acl group_b src "/etc/squid/ip_group_b.txt"

# [C类]：受限设备/哑终端 (免密 + 仅白名单)
# 请确保文件存在: touch /etc/squid/ip_group_c.txt
acl group_c src "/etc/squid/ip_group_c.txt"

# [D类]：受限员工 (密码 + 仅白名单)
# 请确保文件存在: touch /etc/squid/ip_group_d.txt
acl group_d src "/etc/squid/ip_group_d.txt"

# [资源白名单]：受限用户只能访问这里面的网站
acl allow_domains dstdomain "/etc/squid/allow.txt"

# ==============================================================================
# 3. 访问控制规则 (逻辑核心，顺序极为关键)
# ==============================================================================

# --- [第1层] 安全门卫 (最优先) ---
# 拦截非安全端口，防止代理被滥用
http_access deny !Safe_ports
http_access deny CONNECT !SSL_ports
http_access allow localhost manager
http_access deny manager

# --- [第2层] A类用户 (至高权限) ---
# 逻辑：只要是 A 类 IP，无需密码，直接放行所有
http_access allow group_a

# --- [第3层] C类用户 (免密受限) ---
# 1. 如果是 C 类 IP 且 访问的是白名单 -> 放行
http_access allow group_c allow_domains
# 2. [关键拦截] 如果是 C 类 IP (说明上面没匹配上，想访问非白名单) -> 直接拒绝！
# 这一步是为了防止 C 类掉落到下面的密码验证环节
http_access deny group_c

# --- [第4层] D类用户 (密码受限) ---
# 1. 如果是 D 类 IP 且 访问白名单 且 密码正确 -> 放行
http_access allow group_d allow_domains auth_user
# 2. [关键拦截] 同上，如果是 D 类但没访问白名单 -> 直接拒绝
http_access deny group_d

# --- [第5层] B类用户 (密码全开) ---
# 1. 如果是 B 类 IP 且 密码正确 -> 放行所有
http_access allow group_b auth_user

# --- [第6层] 兜底拒绝 ---
# 不属于以上任何情况，或者密码输错，或者未授权IP -> 拒绝
http_access deny all

# ==============================================================================
# 4. 常规参数设置
# ==============================================================================
http_port 3128
cache_mem 256 MB
coredump_dir /var/spool/squid

refresh_pattern ^ftp:       1440    20% 10080
refresh_pattern ^gopher:    1440    0%  1440
refresh_pattern -i (/cgi-bin/|\?) 0 0%  0
refresh_pattern .       0   20% 4320